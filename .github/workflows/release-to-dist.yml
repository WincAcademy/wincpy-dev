name: Release to dist repo

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Create GitHub App token for dist repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DIST_APP_ID }}
          private-key: ${{ secrets.DIST_APP_PRIVATE_KEY }}
          owner: WincAcademy
          repositories: wincpy-dist

      - name: Create release and upload wheel to dist repo
        uses: softprops/action-gh-release@v2
        with:
          repository: WincAcademy/wincpy-dist
          tag_name: ${{ github.ref_name }}
          target_commitish: main
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
