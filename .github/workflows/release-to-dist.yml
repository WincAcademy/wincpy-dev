name: Release to Dist Repo

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Create GitHub App token for dist repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DIST_APP_ID }}
          private-key: ${{ secrets.DIST_APP_PRIVATE_KEY }}
          owner: WincAcademy
          repositories: wincpy-dist

      - name: Inspect app access to target repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euxo pipefail

          echo "== Repo lookup =="
          curl -i -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/WincAcademy/wincpy-dist

          echo
          echo "== Installation lookup =="
          curl -i -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/WincAcademy/wincpy-dist/installation

          echo
          echo "== Draft release create test =="
          curl -i -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/WincAcademy/wincpy-dist/releases \
            -d '{"tag_name":"debug-app-token-test","target_commitish":"main","name":"debug-app-token-test","draft":true}'

      - name: Create release and upload wheel to dist repo
        uses: softprops/action-gh-release@v2
        with:
          repository: WincAcademy/wincpy-dist
          tag_name: ${{ github.ref_name }}
          target_commitish: main
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
